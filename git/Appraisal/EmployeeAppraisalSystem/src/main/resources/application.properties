# HikariCP connection pool settings
spring.datasource.hikari.maximumPoolSize=100
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=120000
spring.datasource.hikari.maxLifetime=300000
spring.datasource.hikari.leakDetectionThreshold=60000
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# File upload / storage path
appraisal.goal.document.path=D:/employeeappraisal/uploads/

appraisal.works.path=D:/appraisal/works/

# HR specific config
hr.employee.id=10452

# Feedback email content
feedback.request.title=360 Degree Feedback Request
feedback.request.description=Please provide honest feedback on the employee's performance.

# Jackson JSON date formatting
spring.jackson.date-format=dd-MM-yyyy
spring.jackson.serialization.write-dates-as-timestamps=false

